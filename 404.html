<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página No Encontrada | AURA TRAVEL</title>
    <link rel="stylesheet" href="/css/aura.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--aura-black, #0A0A0F);
            position: relative;
            overflow: hidden;
        }
        .error-page::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .error-content {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .error-code {
            font-family: 'Inter', sans-serif;
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #C9A96E, #E8D5A3, #C9A96E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            color: #CBD5E1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }
        .error-desc {
            color: #94A3B8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .error-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .error-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border: 1px solid rgba(201,169,110,0.3);
            border-radius: 8px;
            color: #C9A96E;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(201,169,110,0.05);
        }
        .error-link:hover {
            background: rgba(201,169,110,0.15);
            border-color: #C9A96E;
            transform: translateY(-2px);
        }
        .error-link.primary {
            background: #C9A96E;
            color: #0A0A0F;
            border-color: #C9A96E;
        }
        .error-link.primary:hover {
            background: #E8D5A3;
        }
        .error-hud {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', monospace;
            font-size: 0.7rem;
            color: rgba(201,169,110,0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Ruta No Encontrada</h1>
            <p class="error-desc">
                La página que busca no existe o ha sido reubicada. 
                Nuestro centro de operaciones puede asistirle.
            </p>
            <div class="error-links">
                <a href="/" class="error-link primary">
                    <i class="fas fa-home"></i> Inicio
                </a>
                <a href="/pages/aeropuerto.html" class="error-link">
                    <i class="fas fa-plane"></i> Aeropuerto
                </a>
                <a href="/pages/turismo.html" class="error-link">
                    <i class="fas fa-mountain"></i> Turismo
                </a>
                <a href="/pages/corporativo.html" class="error-link">
                    <i class="fas fa-building"></i> Corporativo
                </a>
                <a href="https://wa.me/56926151427" class="error-link" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            </div>
        </div>
        <div class="error-hud">AURA // SCL // SISTEMA_ACTIVO</div>
    </div>
    <script src="/js/analytics.js"></script>
</body>
</html>
